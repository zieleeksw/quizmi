spring:
  application:
    name: quizmi
  profiles:
    default: dev
  liquibase:
    change-log: classpath:db/liquibase-changelog.xml

app:
  bootstrap:
    admin:
      enabled: ${QUIZMI_BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${QUIZMI_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${QUIZMI_BOOTSTRAP_ADMIN_PASSWORD:}
  cors:
    allowed-origin-patterns: ${QUIZMI_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,http://192.168.*:4200,http://10.*.*.*:4200}
  logging:
    controller-execution-time:
      enabled: ${QUIZMI_CONTROLLER_EXECUTION_TIME_LOGGING_ENABLED:false}
  ai:
    feedback:
      enabled: ${QUIZMI_AI_FEEDBACK_ENABLED:true}
      base-url: ${QUIZMI_AI_FEEDBACK_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${QUIZMI_AI_FEEDBACK_API_KEY:}
      model: ${QUIZMI_AI_FEEDBACK_MODEL:google/gemma-3-27b-it:free"}
      max-tokens: ${QUIZMI_AI_FEEDBACK_MAX_TOKENS:220}
      app-name: ${QUIZMI_AI_FEEDBACK_APP_NAME:Quizmi}
      site-url: ${QUIZMI_AI_FEEDBACK_SITE_URL:}
  security:
    jwt:
      secret-key: ${QUIZMI_JWT_SECRET_KEY:5267556B58703272357538782F413F4428472B4B6250655368566D5971337436}
      expiration:
        access-token-ms: ${QUIZMI_JWT_ACCESS_TOKEN_MS:900000}
        refresh-token-ms: ${QUIZMI_JWT_REFRESH_TOKEN_MS:604800000}
